name: Dead Link Check

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.html"
      - "**/*.yml"
      - "**/*.yaml"

jobs:
  link-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --exclude-mail
            --exclude "https://github-readme-streak-stats.herokuapp.com/.*"
            --exclude "https://github-readme-activity-graph.vercel.app/.*"
            --exclude "https://github-profile-summary-cards.vercel.app/.*"
            --exclude "https://readme-typing-svg.demolab.com/.*"
            --exclude "https://capsule-render.vercel.app/.*"
            "**/*.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
