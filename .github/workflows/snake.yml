name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: snkgen
        uses: isitreallyalive/snkgen@v3.3.0
        with:
          github_user_name: DwijeshD
          github_token: ${{ github.token }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=%2367e8f9&color_dots=%23020617,%230f172a,%231e3a8a,%232563eb,%2338bdf8
            dist/github-contribution-grid-snake.svg?color_snake=%2306b6d4&color_dots=%23f8fafc,%23dbeafe,%2393c5fd,%2360a5fa,%233b82f6

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
