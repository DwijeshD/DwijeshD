name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: snkgen
        uses: isitreallyalive/snkgen@v3.3.0
        with:
          github_user_name: DwijeshD
          github_token: ${{ github.token }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=%2338bdf8&color_dots=%23ebedf0,%23bae6fd,%237dd3fc,%2338bdf8,%230ea5e9&color_progress=%232563eb
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2338bdf8&color_dots=%23020617,%230f172a,%230e7490,%232563eb,%2338bdf8&color_progress=%2338bdf8

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
